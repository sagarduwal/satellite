<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Satellite</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Satellite</h1>
    <p>Decentralized social networking on static sites</p>
    <div id="public-key-display"></div>
  </header>

  <div id="setup-panel">
    <label for="domain-input">Your domain (without https://)</label>
    <input type="text" id="domain-input" placeholder="you.github.io">
    <label for="repo-input">GitHub repo (owner/repo)</label>
    <input type="text" id="repo-input" placeholder="username/satellite">

    <div id="device-code-panel" style="display:none;">
      <p>Enter this code on GitHub:</p>
      <div id="device-code" class="device-code"></div>
    </div>

    <details>
      <summary>Or enter a token manually</summary>
      <label for="token-input">GitHub token</label>
      <input type="password" id="token-input" placeholder="ghp_...">
    </details>

    <button onclick="saveSetup()">Save &amp; Initialize</button>
  </div>

  <div id="main-ui" style="display:none;">
    <div id="compose">
      <textarea id="post-text" placeholder="What's on your mind?"></textarea>
      <button onclick="submitPost()" id="post-btn">Post</button>
    </div>

    <div id="follow-panel">
      <div id="follow-input-row">
        <input type="text" id="follow-domain-input" placeholder="alice.github.io">
        <button onclick="doFollow()" id="follow-btn">Follow</button>
      </div>
      <div id="follows-list"></div>
      <button onclick="reinitialize()" id="reinit-btn" class="secondary-btn">Re-initialize site</button>
    </div>
  </div>

  <div id="status">Loading...</div>
  <div id="feed"></div>

  <script type="importmap">
    { "imports": { "libsodium-wrappers-sumo": "https://esm.sh/libsodium-wrappers-sumo@0.7.15" } }
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
